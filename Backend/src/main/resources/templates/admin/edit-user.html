<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Modifier l'utilisateur</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="card">
        <h2>Modifier l'Utilisateur : <span th:text="${user.nom}"></span></h2>
        
        <form th:action="@{/admin/users/update/{id}(id=${user.id})}" th:object="${user}" method="post">
            <div>
                <label>Nom :</label>
                <input type="text" th:field="*{nom}" required />
            </div>
            
            <div>
                <label>Email :</label>
                <input type="email" th:field="*{email}" required />
            </div>

            <div>
                <label>Rôle :</label>
                <select th:field="*{role}">
                    <option th:each="roleOpt : ${roles}" 
                            th:value="${roleOpt}" 
                            th:text="${roleOpt}"></option>
                </select>
            </div>

            <div>
                <label>Solde (€) :</label>
                <input type="number" step="0.01" th:field="*{solde}" />
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-save">Enregistrer</button>
                <a th:href="@{/admin/users}" class="btn btn-cancel">Annuler</a>
            </div>
        </form>
    </div>
</body>
</html>
