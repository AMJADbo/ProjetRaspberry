<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 4px; color: #555; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 0.5rem; }
        button:hover { background: #4338ca; }
        .error { color: red; text-align: center; margin-bottom: 1rem; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h2>💳 RFID Payment</h2>
    <p class="error" th:if="${error}" th:text="${error}"></p>
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="votre@email.com" required/>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="motDePasse" placeholder="••••••••" required/>
        </div>
        <button type="submit">Se connecter</button>
    </form>
</div>
</body>
</html>
