<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon compte</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar { background: #4f46e5; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .container { max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
        .solde { font-size: 2.5rem; font-weight: bold; color: #4f46e5; text-align: center; margin: 1rem 0; }
        .solde-label { text-align: center; color: #888; font-size: 14px; }
        h2 { margin-bottom: 1rem; color: #333; }
        .form-row { display: flex; gap: 10px; }
        .form-row input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-primary { padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 10px; text-align: left; font-size: 13px; color: #666; border-bottom: 1px solid #eee; }
        td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .credit { color: #059669; font-weight: bold; }
        .payment { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>
<nav class="navbar">
    <span>👤 <span th:text="${sessionUser.nom}"></span></span>
    <a href="/logout">Se déconnecter</a>
</nav>
<div class="container">
    <!-- Solde -->
    <div class="card">
        <p class="solde-label">Solde disponible</p>
        <p class="solde" th:text="${sessionUser.solde} + ' €'"></p>
    </div>

    <!-- Recharger -->
    <div class="card">
        <h2>Recharger mon compte</h2>
        <form th:action="@{/user/credit}" method="post">
            <div class="form-row">
                <input type="number" name="montant" placeholder="Montant en €" step="0.01" min="1" required/>
                <button class="btn-primary" type="submit">Recharger</button>
            </div>
        </form>
    </div>

    <!-- Historique -->
    <div class="card">
        <h2>Historique des transactions</h2>
        <table>
            <thead>
                <tr><th>Date</th><th>Type</th><th>Montant</th><th>Description</th></tr>
            </thead>
            <tbody>
                <tr th:each="t : ${transactions}">
                    <td th:text="${#temporals.format(t.date, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${t.type}"></td>
                    <td th:classappend="${t.type.name() == 'CREDIT'} ? 'credit' : 'payment'"
                        th:text="${t.type.name() == 'CREDIT'} ? '+' + ${t.montant} + ' €' : '-' + ${t.montant} + ' €'"></td>
                    <td th:text="${t.description}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
