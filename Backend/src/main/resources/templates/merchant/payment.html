<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paiement commerçant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar { background: #4f46e5; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .container { max-width: 500px; margin: 3rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h2 { margin-bottom: 1.5rem; color: #333; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 4px; color: #555; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-primary { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 0.5rem; }
        .success { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; margin-bottom: 1rem; text-align: center; }
        .error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; margin-bottom: 1rem; text-align: center; }
    </style>
</head>
<body>
<nav class="navbar">
    <span>🏪 <span th:text="${sessionUser.nom}"></span></span>
    <a href="/logout">Se déconnecter</a>
</nav>
<div class="container">
    <div class="card">
        <h2>Encaisser un paiement</h2>
        <p class="success" th:if="${success}" th:text="${success}"></p>
        <p class="error" th:if="${error}" th:text="${error}"></p>
        <form th:action="@{/merchant/payment}" method="post">
            <div class="form-group">
                <label>Montant à encaisser (€)</label>
                <input type="number" name="montant" placeholder="0.00" step="0.01" min="0.01" required/>
            </div>
            <div class="form-group">
                <label>UID du badge (lu par le lecteur)</label>
                <input type="text" name="uidRfid" placeholder="ex: 84af25d9d7" required/>
            </div>
            <button class="btn-primary" type="submit">Encaisser</button>
        </form>
    </div>
</div>
</body>
</html>
